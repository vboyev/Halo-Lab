<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Halo Lab — Final CTA</title>
    <style>
      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f5f5f7;
      }

      .final-cta {
        position: relative;
        isolation: isolate;
        min-height: 100svh;
        overflow: hidden;
        background: linear-gradient(180deg, #4e7fd4 0%, #9db7e3 30%, #f5f5f7 68%, #f5f5f7 100%);
        color: #08081d;
      }

      .final-cta__orbit {
        position: absolute;
        z-index: -1;
        top: 14.4%;
        left: 50%;
        width: max(112.35vw, 1180px);
        aspect-ratio: 1;
        transform: translateX(-50%);
        pointer-events: none;
        transition: transform 420ms cubic-bezier(.22, .8, .24, 1);
        will-change: transform;
      }

      .final-cta__orbit.is-hovered {
        transform: translateX(-50%) translateY(-8px);
      }

      .final-cta__orbit img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        animation: final-cta-spin 200s linear infinite;
        will-change: transform;
      }

      .final-cta__content {
        position: absolute;
        z-index: 2;
        top: 68.6%;
        left: 50%;
        width: min(600px, calc(100% - 48px));
        transform: translate(-50%, -50%);
        text-align: center;
      }

      .final-cta__title {
        margin: 0;
        font-size: clamp(42px, 4.05vw, 58px);
        font-weight: 600;
        line-height: .98;
        letter-spacing: -.045em;
      }

      .final-cta__description {
        max-width: 520px;
        margin: 32px auto 0;
        color: rgba(8, 8, 29, .72);
        font-size: 18px;
        line-height: 1.45;
      }

      .final-cta__button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        height: 44px;
        margin-top: 36px;
        padding: 0 24px;
        border-radius: 999px;
        background: #f6c752;
        color: #08081d;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: .01em;
        text-decoration: none;
        transition: transform 300ms cubic-bezier(.22, .8, .24, 1), background 200ms ease;
      }

      .final-cta__button:hover {
        background: #ffd267;
        transform: scale(1.04);
      }

      @keyframes final-cta-spin {
        to { transform: rotate(360deg); }
      }

      @media (max-width: 800px) {
        .final-cta__orbit {
          top: 18%;
          width: max(190vw, 900px);
        }

        .final-cta__content { top: 53%; }
        .final-cta__title { font-size: clamp(38px, 11vw, 52px); }
        .final-cta__description { margin-top: 24px; font-size: 16px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .final-cta__orbit img { animation: none; }
      }
    </style>
  </head>
  <body>
    <main class="final-cta" aria-labelledby="final-cta-title">
      <div class="final-cta__orbit" aria-hidden="true">
        <img src="https://cdn.prod.website-files.com/63f38a8c92397a024fcb9ae8/6a00877b6353604e2daa98d2_shots-circle.avif" alt="" />
      </div>
      <div class="final-cta__content">
        <h1 class="final-cta__title" id="final-cta-title">Ready to discuss your<br />project with us?</h1>
        <p class="final-cta__description">Let’s discuss how we can craft a distinctive brand identity<br />that captivates, connects, and converts.</p>
        <a class="final-cta__button" href="https://halo-lab.webflow.io/contacts">BOOK A CALL</a>
      </div>
    </main>
    <script>
      (() => {
        const section = document.querySelector('.final-cta');
        const orbit = document.querySelector('.final-cta__orbit');
        const finePointer = matchMedia('(pointer: fine)');

        section.addEventListener('pointermove', event => {
          if (!finePointer.matches) return;
          const rect = orbit.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          const distance = Math.hypot(event.clientX - centerX, event.clientY - centerY);
          const overCards = distance > rect.width * .34 && distance < rect.width * .51;
          orbit.classList.toggle('is-hovered', overCards);
        });

        section.addEventListener('pointerleave', () => orbit.classList.remove('is-hovered'));
      })();
    </script>
  </body>
</html>
