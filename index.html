<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vixiv — case hover preview</title>
    <style>
      @font-face {
        font-family: "Suisse Intl";
        src: url("SuisseIntl-Regular-WebS.woff") format("woff");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Suisse Intl";
        src: url("SuisseIntl-Medium-WebS.woff") format("woff");
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }

      :root {
        color-scheme: dark;
        font-family: "Suisse Intl", Arial, sans-serif;
        background: #1b1e20;
        color: #fff;
      }

      * { box-sizing: border-box; }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body { background: #1b1e20; }

      .case-card {
        position: relative;
        isolation: isolate;
        width: 100%;
        min-height: 100svh;
        overflow: hidden;
        background: #303437 url("vixiv-background.png") center / cover no-repeat;
        cursor: none;
      }

      .case-card::after {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: rgba(12, 14, 16, 0.14);
        pointer-events: none;
      }

      .case-copy {
        position: absolute;
        z-index: 3;
        left: clamp(32px, 4.45vw, 64px);
        top: 50%;
        width: min(380px, 32vw);
        transform: translateY(-4%);
        cursor: pointer;
      }

      .case-title {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin: 0 0 13px;
        color: #fff;
        font-size: clamp(28px, 2.25vw, 32px);
        font-weight: 500;
        line-height: 1;
        letter-spacing: -0.025em;
        cursor: pointer;
        text-decoration: none;
      }

      .case-title__arrow {
        display: block;
        width: 19px;
        height: 19px;
        opacity: 0;
        transform: translateX(-9px);
        transition: opacity 180ms ease, transform 360ms cubic-bezier(.22, .8, .24, 1);
      }

      .case-title:hover .case-title__arrow,
      .case-title:focus-visible .case-title__arrow,
      .case-card.is-title-hover .case-title__arrow {
        opacity: 1;
        transform: translateX(0);
      }

      .case-title:focus-visible {
        outline: 1px solid rgba(255, 255, 255, .72);
        outline-offset: 7px;
        border-radius: 2px;
      }

      .case-description {
        max-width: 350px;
        margin: 0;
        color: rgba(255, 255, 255, .56);
        font-size: clamp(16px, 1.25vw, 18px);
        line-height: 1.45;
        letter-spacing: -.012em;
      }

      .case-cta {
        display: inline-flex;
        align-items: center;
        margin-top: 32px;
        padding: 0;
        border: 0;
        color: rgba(255, 255, 255, .92);
        font-size: 12px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: .01em;
        text-decoration: none;
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
        transition: opacity 220ms ease, transform 360ms cubic-bezier(.22, .8, .24, 1), color 180ms ease;
      }

      .case-card.is-title-hover .case-cta,
      .case-cta:focus-visible {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .case-cta:hover,
      .case-cta:focus-visible {
        color: #fff;
        outline: none;
      }

      .case-preview {
        --preview-width: min(37.5vw, 540px);
        position: absolute;
        z-index: 2;
        top: 0;
        left: 0;
        width: var(--preview-width);
        margin: 0;
        pointer-events: none;
        will-change: transform;
      }

      .case-preview__label,
      .case-preview__count {
        position: absolute;
        left: 50%;
        margin: 0;
        color: rgba(255, 255, 255, .92);
        font-size: 12px;
        font-weight: 400;
        line-height: 1;
        letter-spacing: .01em;
        white-space: nowrap;
        transform: translateX(-50%);
      }

      .case-preview__label {
        top: -23px;
        opacity: 1;
        transition: opacity 180ms ease;
      }

      .case-card.is-title-hover .case-preview__label { opacity: 0; }
      .case-preview__count { bottom: -25px; }

      .case-preview__media {
        display: block;
        width: 100%;
        aspect-ratio: 540 / 400;
        object-fit: cover;
        border-radius: 8px;
        background: #74777a;
      }

      .native-cursor {
        position: absolute;
        z-index: 4;
        top: 0;
        left: 0;
        width: 18px;
        height: 23px;
        opacity: 0;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, .65));
        pointer-events: none;
        will-change: transform;
      }

      .case-card.is-active .native-cursor { opacity: 1; }
      .case-card.is-title-hover .native-cursor { opacity: 0; }

      @media (max-width: 800px), (pointer: coarse) {
        .case-card {
          min-height: 760px;
          cursor: auto;
        }

        .case-copy {
          top: auto;
          right: 24px;
          bottom: 70px;
          left: 24px;
          width: auto;
          transform: none;
        }

        .case-preview {
          --preview-width: min(82vw, 540px);
          top: 44%;
          left: 50%;
          transform: translate(-50%, -50%) !important;
        }

        .case-title__arrow {
          opacity: 1;
          transform: none;
        }

        .native-cursor { display: none; }
      }

      @media (prefers-reduced-motion: reduce) {
        .case-title__arrow { transition: none; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="case-card" aria-labelledby="vixiv-title">
        <div class="case-copy">
          <a class="case-title" id="vixiv-title" href="#vixiv-case">
            <span>Vixiv</span>
            <svg class="case-title__arrow" aria-hidden="true" role="img" fill="currentColor" viewBox="0 0 19 19">
              <path fill-rule="evenodd" d="M6.25.879 14.871 9.5l-8.62 8.622L4.128 16l6.5-6.5-6.5-6.5L6.25.88Z" clip-rule="evenodd"></path>
            </svg>
          </a>
          <p class="case-description">
            Launching an AI-powered engineering platform from beta to a market-ready product.
          </p>
          <a class="case-cta" href="#vixiv-case">VIEW CASE STUDY</a>
        </div>

        <figure class="case-preview" aria-hidden="true">
          <figcaption class="case-preview__label">VIEW CASE STUDY</figcaption>
          <video
            class="case-preview__media"
            poster="vixiv-preview.png"
            width="540"
            height="400"
            autoplay
            loop
            muted
            playsinline
            preload="metadata"
          >
            <source src="showreal-preview-33_mp4.mp4" type="video/mp4" />
          </video>
          <p class="case-preview__count">01 / 04</p>
        </figure>

        <svg class="native-cursor" viewBox="0 0 18 23" aria-hidden="true">
          <path d="M1 1.2 16.3 12l-7.1 1.1-3.7 7.1L1 1.2Z" fill="#fff" stroke="#111" stroke-width="1.4" stroke-linejoin="round" />
        </svg>

      </section>
    </main>

    <script>
      (() => {
        const card = document.querySelector('.case-card');
        const preview = card.querySelector('.case-preview');
        const copy = card.querySelector('.case-copy');
        const title = card.querySelector('.case-title');
        const cursor = card.querySelector('.native-cursor');
        const finePointer = window.matchMedia('(pointer: fine)');
        const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)');

        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        let targetScale = 1;
        let currentScale = 1;
        let cursorX = 0;
        let cursorY = 0;
        let titleHover = false;
        let frame = 0;

        const centeredPosition = () => ({
          x: card.clientWidth / 2,
          y: card.clientHeight / 2
        });

        const clampTarget = (x, y) => {
          const rect = preview.getBoundingClientRect();
          const halfW = rect.width / 2;
          const halfH = rect.height / 2;
          const labelSpace = 34;
          const sideSpace = 20;

          return {
            x: Math.max(halfW + sideSpace, Math.min(card.clientWidth - halfW - sideSpace, x)),
            y: Math.max(halfH + labelSpace, Math.min(card.clientHeight - halfH - labelSpace, y))
          };
        };

        const render = () => {
          const easing = reduceMotion.matches ? 1 : (titleHover ? .11 : .2);
          currentX += (targetX - currentX) * easing;
          currentY += (targetY - currentY) * easing;
          currentScale += (targetScale - currentScale) * (reduceMotion.matches ? 1 : .12);
          preview.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translate(-50%, -50%) scale(${currentScale})`;
          cursor.style.transform = `translate3d(${cursorX}px, ${cursorY}px, 0)`;

          if (Math.abs(targetX - currentX) > .1 || Math.abs(targetY - currentY) > .1 ||
              Math.abs(targetScale - currentScale) > .001) {
            frame = requestAnimationFrame(render);
          } else {
            frame = 0;
          }
        };

        const requestRender = () => {
          if (!frame) frame = requestAnimationFrame(render);
        };

        const movePreviewToCenter = () => {
          const center = centeredPosition();
          targetX = center.x;
          targetY = center.y;
          requestRender();
        };

        const reset = () => {
          const center = centeredPosition();
          targetX = currentX = center.x;
          targetY = currentY = center.y;
          targetScale = currentScale = 1;
          preview.style.transform = `translate3d(${currentX}px, ${currentY}px, 0) translate(-50%, -50%) scale(1)`;
        };

        card.addEventListener('pointerenter', () => card.classList.add('is-active'));
        card.addEventListener('pointerleave', () => {
          card.classList.remove('is-active');
        });

        card.addEventListener('pointermove', (event) => {
          if (!finePointer.matches) return;
          const cardRect = card.getBoundingClientRect();
          cursorX = event.clientX - cardRect.left;
          cursorY = event.clientY - cardRect.top;

          const copyRect = copy.getBoundingClientRect();
          const isOverTitle = event.clientX >= copyRect.left &&
            event.clientX <= copyRect.right &&
            event.clientY >= copyRect.top &&
            event.clientY <= copyRect.bottom;

          if (isOverTitle && !titleHover) pinPreview();
          if (!isOverTitle && titleHover && document.activeElement !== title) releasePreview(event);

          if (!titleHover) {
            const next = clampTarget(cursorX, cursorY);
            targetX = next.x;
            targetY = next.y;
          }

          requestRender();
        });

        const pinPreview = () => {
          titleHover = true;
          targetScale = .92;
          card.classList.add('is-title-hover');
          movePreviewToCenter();
        };

        const releasePreview = (event) => {
          titleHover = false;
          targetScale = 1;
          card.classList.remove('is-title-hover');
          if (event && finePointer.matches) {
            const cardRect = card.getBoundingClientRect();
            const next = clampTarget(event.clientX - cardRect.left, event.clientY - cardRect.top);
            targetX = next.x;
            targetY = next.y;
            requestRender();
          }
        };

        copy.addEventListener('pointerenter', pinPreview);
        copy.addEventListener('pointerleave', releasePreview);
        title.addEventListener('focus', pinPreview);
        title.addEventListener('blur', releasePreview);
        window.addEventListener('resize', reset);
        reset();
      })();
    </script>
  </body>
</html>
